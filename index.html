<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMPACT Webapp</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="viewer"></canvas>

  <div id="fileLoader">
    <label for="volumeInput">Load NRRD Volume</label>
    <input type="file" id="volumeInput" accept=".nrrd">

    <input type="file" id="maskInput" accept=".nrrd">
    <label for="maskInput">Load Mask Volume</label>
  </div>
  <div id="toolbar">

    <!-- Dropdown -->
    <label for="overlayMode">Overlay:</label>
    <select id="overlayMode">
      <option>No Overlay</option>
      <option>Outline Only</option>
      <option>Transparent Overlay</option>
    </select>
  
    <!-- Sliders inline -->
    <label>Contrast</label>
    <input type="range" id="contrastSlider" min="0" max="255" value="128">
  
    <label>ImageOpacity</label>
    <input type="range" id="ImageOpacitySlider" min="0" max="255" value="128">
  
    <label>OverlayOpacity</label>
    <input type="range" id="OverlayOpacitySlider" min="0" max="255" value="128">
  
  </div>    
  <div id="hotkeys">
    <p><b>Hotkeys</b></p>
    <p>V — cycle view</p>
    <p>1 — paint</p>
    <p>2 — erase</p>
    <p>X — save mask</p>
    <p>Z — undo</p>
  </div>

  <script type="module" src="main.js"></script>
  <script src="overlaySettings.js"></script>
</body>
</html>
