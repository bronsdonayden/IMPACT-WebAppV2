<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMPACT Webapp</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="viewer"></canvas>

  <div id="fileLoader">
    <label for="volumeInput">Load NRRD Volume / PNG</label>
    <input type="file" id="volumeInput" accept=".nrrd,.png">

    <label for="maskInput">Load Mask (NRRD / PNG)</label>
    <input type="file" id="maskInput" accept=".nrrd,.png">
</div>

  <div id="controls">
  <label>Brush Size: <span id="brushLabel">3</span></label>
  <input type="range" id="brushSlider" min="1" max="25" value="3">
</div>
  </div>

  <div id="hotkeys">
    <p><b>Hotkeys</b></p>
    <p>V — cycle view</p>
    <p>1 (hold) — paint</p>
    <p>2 (hold) — erase</p>
    <p>[ / ] — brush size</p>
    <p>C — copy mask to next slice</p>
    <p>B — copy mask to prev slice</p>
    <p>I — interpolate between painted slices</p>
    <p>Z — undo</p>
    <p>X — save mask</p>
    <p>H — toggle mask visibility</p>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
